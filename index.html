<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>🔥 MuX v4.6 — Full Online</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:white; text-align:center; }
    input, button { padding:8px; margin:5px; border-radius:5px; border:none; }
    button { background:gold; cursor:pointer; font-weight:bold; }
    .admin-panel, .dev-panel { display:none; border:1px solid #333; padding:10px; margin:10px; border-radius:10px; }
    .chat-box { border:1px solid #333; padding:10px; height:200px; overflow-y:scroll; margin:10px auto; width:80%; background:#222; }
  </style>
</head>
<body>
  <h1>🔥 MuX v4.6 — Full Online</h1>

  <div id="login">
    <input type="text" id="nickname" placeholder="Введите ник (уникально)">
    <button onclick="login()">Войти</button>
    <p id="status"></p>
  </div>

  <div id="menu" style="display:none;">
    <h2>Меню</h2>
    <button onclick="openTab('jobs')">Работы</button>
    <button onclick="openTab('cases')">Кейсы</button>
    <button onclick="openTab('market')">Рынок</button>
    <button onclick="openTab('events')">Ивенты</button>
    <button onclick="openTab('quiz')">Викторины</button>
    <button onclick="openTab('clans')">Кланы</button>
    <p>⭐ Звёзды: <span id="stars">0</span></p>
  </div>

  <div id="chat" style="display:none;">
    <h2>Общий чат</h2>
    <div id="messages" class="chat-box"></div>
    <input type="text" id="msg" placeholder="Сообщение...">
    <button onclick="sendMsg()">Отправить</button>
  </div>

  <div id="adminPanel" class="admin-panel">
    <h2>Админ-панель</h2>
    <button onclick="adminMute()">Выдать мут</button>
    <button onclick="adminBan()">Забанить</button>
    <button onclick="adminEvent()">Ивент от админа</button>
  </div>

  <div id="devPanel" class="dev-panel">
    <h2>👑 Панель разработчика</h2>
    <button onclick="giveStars()">Выдать себе 100⭐</button>
    <button onclick="grantAdmin()">Выдать админку игроку</button>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, push, onChildAdded, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // 🔥 ТВОИ ДАННЫЕ
    const firebaseConfig = {
      apiKey: "AIzaSyCp-piAFunR8ARXVrq31YpjBUF-tjFNjLs",
      authDomain: "muxgame-37823.firebaseapp.com",
      databaseURL: "https://muxgame-37823-default-rtdb.firebaseio.com",
      projectId: "muxgame-37823",
      storageBucket: "muxgame-37823.appspot.com",
      messagingSenderId: "906763346421",
      appId: "1:906763346421:web:d6b5863e45b78b50a140bc",
      measurementId: "G-7QJNEFR2W3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let nickname = "";
    let stars = 0;
    let level = 0;

    window.login = function() {
      nickname = document.getElementById("nickname").value.trim();
      if (!nickname) {
        document.getElementById("status").innerText = "Введите ник!";
        return;
      }

      signInAnonymously(auth).then(() => {
        document.getElementById("login").style.display = "none";
        document.getElementById("menu").style.display = "block";
        document.getElementById("chat").style.display = "block";

        if (nickname === "MuX") {
          level = 15;
          document.getElementById("devPanel").style.display = "block";
        }
        if (level >= 1) {
          document.getElementById("adminPanel").style.display = "block";
        }

        set(ref(db, "players/" + nickname), {
          nick: nickname,
          stars: stars,
          level: level
        });

        const chatRef = ref(db, "chat");
        onChildAdded(chatRef, (data) => {
          let msg = data.val();
          let div = document.createElement("div");
          div.innerText = msg.nick + ": " + msg.text;
          document.getElementById("messages").appendChild(div);
        });

      }).catch((e) => {
        document.getElementById("status").innerText = "Ошибка входа: " + e.message;
      });
    }

    window.sendMsg = function() {
      let text = document.getElementById("msg").value;
      if (!text) return;
      push(ref(db, "chat"), {
        nick: nickname,
        text: text
      });
      document.getElementById("msg").value = "";
    }

    window.adminMute = function() { alert("Мут выдан"); }
    window.adminBan = function() { alert("Игрок забанен"); }
    window.adminEvent = function() { alert("Ивент запущен"); }

    window.giveStars = function() {
      stars += 100;
      document.getElementById("stars").innerText = stars;
      update(ref(db, "players/" + nickname), { stars });
    }

    window.grantAdmin = function() {
      alert("Ты можешь назначить админку (логика допишется позже)");
    }

    window.openTab = function(tab) {
      alert("Раздел: " + tab);
    }
  </script>
</body>
</html>
